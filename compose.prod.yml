x-airflow-prod-env: &airflow-prod-env
  env_file:
    - ./.env

services:
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "local/${MINIO_STORAGE_BUCKET_MEDIA:-osint-media}"
        mc mb --ignore-existing "local/${MINIO_STORAGE_BUCKET_EXPORTS:-osint-exports}"
    restart: 'no'

  backend:
    command: /app/entrypoint.prod.sh
    env_file:
      - ./.env
    ports:
      - ${BACKEND_PORT:-8000}:8000
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      DEBUG: ${DEBUG:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      MINIO_STORAGE_ENABLED: ${MINIO_STORAGE_ENABLED:-true}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_STORAGE_BUCKET_MEDIA: ${MINIO_STORAGE_BUCKET_MEDIA:-osint-media}
      MINIO_STORAGE_BUCKET_EXPORTS: ${MINIO_STORAGE_BUCKET_EXPORTS:-osint-exports}
      MINIO_MEDIA_LOCATION: ${MINIO_MEDIA_LOCATION:-media}
      MINIO_EXPORTS_LOCATION: ${MINIO_EXPORTS_LOCATION:-exports}
      KEYCLOAK_AUTH_ENABLED: ${KEYCLOAK_AUTH_ENABLED:-true}
      KEYCLOAK_URL: ${KEYCLOAK_PUBLIC_URL:-${KEYCLOAK_URL:-http://localhost:8081}}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-osint-platform}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-osint-frontend}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      UVICORN_TIMEOUT_KEEP_ALIVE: ${UVICORN_TIMEOUT_KEEP_ALIVE:-120}
      UVICORN_LOG_LEVEL: ${UVICORN_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      keycloak:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_KEYCLOAK_ENABLED: ${VITE_KEYCLOAK_ENABLED:-true}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-${KEYCLOAK_URL:-http://localhost:8081}}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-osint-platform}
        VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-osint-frontend}
    env_file:
      - ./.env
    ports:
      - ${FRONTEND_PORT:-3000}:3000
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/healthz >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  geo-bootstrap:
    build: ./backend
    command: python /workspace/pipelines/scripts/geo/load_br_geo_reference.py
    env_file:
      - ./.env
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - ./:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  airflow-webserver:
    <<: *airflow-prod-env

  airflow-scheduler:
    <<: *airflow-prod-env

  airflow-triggerer:
    <<: *airflow-prod-env

  airflow-init:
    <<: *airflow-prod-env

  airflow-cli:
    <<: *airflow-prod-env