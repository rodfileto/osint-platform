# Cloudflare Tunnel overlay
# Usage:
#   docker compose -f docker-compose.yml -f compose.prod.yml -f compose.tunnel.yml up -d
#
# Prerequisites:
#   1. Create a tunnel in the Cloudflare Zero Trust dashboard (or via `cloudflared tunnel create <name>`)
#   2. Set CLOUDFLARE_TUNNEL_TOKEN in your .env file
#   3. Configure DNS CNAMEs / Public Hostnames for CF_APP_DOMAIN, CF_API_DOMAIN, CF_AUTH_DOMAIN, CF_AIRFLOW_DOMAIN
#      pointing to <tunnel-id>.cfargotunnel.com

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    # --token mode: no local credentials file needed — tunnel identity is
    # embedded in the token provided by the Zero Trust dashboard.
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
