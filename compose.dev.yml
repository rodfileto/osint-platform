x-airflow-dev-env: &airflow-dev-env
  env_file:
    - ./dev/.env

services:
  backend:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./dev/.env
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      DEBUG: ${DEBUG:-true}
    volumes:
      - ./backend:/app
    ports:
      - ${BACKEND_PORT}:8000
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      neo4j:
        condition: service_started
      dev-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend-vite
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    env_file:
      - ./dev/.env
    volumes:
      - ./frontend-vite:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:18000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:18000/ws}
    ports:
      - ${FRONTEND_PORT}:3000
    depends_on:
      - backend

  airflow-webserver:
    <<: *airflow-dev-env

  airflow-scheduler:
    <<: *airflow-dev-env

  airflow-triggerer:
    <<: *airflow-dev-env

  airflow-init:
    <<: *airflow-dev-env

  airflow-cli:
    <<: *airflow-dev-env

  dev-bootstrap:
    build: ./backend
    env_file:
      - ./dev/.env
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
    command: python /workspace/dev/scripts/compose_bootstrap.py
    volumes:
      - ./:/workspace:ro
      - ${AIRFLOW_DATA_HOST_PATH}:/bootstrap-data
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      flyway:
        condition: service_completed_successfully
    restart: 'no'