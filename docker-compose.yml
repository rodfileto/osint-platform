x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: infrastructure/airflow/Dockerfile
  image: osint-platform-airflow:latest
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo
    TZ: ${TZ:-America/Sao_Paulo}
  volumes:
    - ./pipelines/dags:/opt/airflow/dags
    - ./pipelines/logs:/opt/airflow/logs
    - ./pipelines/plugins:/opt/airflow/plugins
    - ./pipelines/scripts:/opt/airflow/scripts
    - ${AIRFLOW_DATA_HOST_PATH:-/mnt/data10tb/osint/pipelines/data}:/opt/airflow/data
    - ${AIRFLOW_TEMP_SSD_HOST_PATH:-/srv/osint/airflow/temp_ssd}:/opt/airflow/temp_ssd
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    flyway:
      condition: service_completed_successfully

services:
  postgres:
    image: postgis/postgis:16-3.4
    command:
      - postgres
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-16GB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-48GB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-64MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-2GB}
      - -c
      - random_page_cost=${POSTGRES_RANDOM_PAGE_COST:-1.1}
      - -c
      - effective_io_concurrency=${POSTGRES_EFFECTIVE_IO_CONCURRENCY:-200}
      - -c
      - max_worker_processes=${POSTGRES_MAX_WORKER_PROCESSES:-8}
      - -c
      - max_parallel_workers=${POSTGRES_MAX_PARALLEL_WORKERS:-8}
      - -c
      - max_parallel_workers_per_gather=${POSTGRES_MAX_PARALLEL_WORKERS_PER_GATHER:-4}
      - -c
      - wal_buffers=${POSTGRES_WAL_BUFFERS:-64MB}
      - -c
      - min_wal_size=${POSTGRES_MIN_WAL_SIZE:-1GB}
      - -c
      - max_wal_size=${POSTGRES_MAX_WAL_SIZE:-4GB}
      - -c
      - checkpoint_completion_target=${POSTGRES_CHECKPOINT_COMPLETION_TARGET:-0.9}
      - -c
      - default_statistics_target=${POSTGRES_DEFAULT_STATISTICS_TARGET:-200}
      - -c
      - huge_pages=${POSTGRES_HUGE_PAGES:-try}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-America/Sao_Paulo}
      PGTZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - ${POSTGRES_DATA_HOST_PATH:-/srv/osint/postgres/data}:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_EXPOSE_PORT:-5432}:5432
    shm_size: ${POSTGRES_SHM_SIZE:-17g}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    ports:
      - ${NEO4J_HTTP_PORT:-7474}:7474
      - ${NEO4J_BOLT_PORT:-7687}:7687
    volumes:
      - ${NEO4J_DATA_HOST_PATH:-/srv/osint/neo4j/data}:/data
      - ./infrastructure/neo4j/plugins:/plugins
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_apoc_export_file_enabled: 'true'
      NEO4J_apoc_import_file_enabled: 'true'
      NEO4J_apoc_import_file_use__neo4j__config: 'true'
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-6g}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_SIZE:-4g}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_SIZE:-4g}
      NEO4J_dbms_memory_transaction_total_max: ${NEO4J_TX_MEMORY:-2g}
      NEO4J_db_tx__log_rotation_retention__policy: ${NEO4J_TX_LOG_RETENTION_POLICY:-2 files}
      NEO4J_db_checkpoint_interval_tx: ${NEO4J_CHECKPOINT_INTERVAL_TX:-50}
      TZ: ${TZ:-America/Sao_Paulo}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - ${REDIS_EXPOSE_PORT:-6380}:6379
    command: redis-server --appendonly yes
    volumes:
      - ${REDIS_DATA_HOST_PATH:-./infrastructure/redis/data}:/data
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - ${MINIO_DATA_HOST_PATH:-/mnt/data10tb/osint/minio}:/data
    ports:
      - ${MINIO_API_PORT:-9000}:9000
      - ${MINIO_CONSOLE_PORT:-9001}:9001
    restart: unless-stopped

  flyway:
    image: flyway/flyway:11-alpine
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_DEFAULT_SCHEMA: public
      FLYWAY_TABLE: flyway_schema_history
      FLYWAY_SCHEMAS: cnpj,finep,geo,airflow,naturalization,sanctions,contracts
      FLYWAY_LOCATIONS: filesystem:/flyway/sql/cnpj,filesystem:/flyway/sql/finep,filesystem:/flyway/sql/geo
      FLYWAY_VALIDATE_MIGRATION_NAMING: 'true'
      FLYWAY_CLEAN_DISABLED: 'true'
      FLYWAY_CONNECT_RETRIES: '60'
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - ./infrastructure/postgres/migrations:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  backend:
    build: ./backend

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}

  airflow-webserver:
    <<: *airflow-common
    profiles:
      - airflow
    command: webserver
    ports:
      - ${AIRFLOW_PORT:-8080}:8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 30s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    profiles:
      - airflow
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --local"]
      interval: 30s
      timeout: 30s
      retries: 5
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    profiles:
      - airflow
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 30s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    profiles:
      - airflow
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: '0:0'
    restart: 'no'

  airflow-cli:
    <<: *airflow-common
    profiles:
      - airflow
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: '0'
    command:
      - bash
      - -c
      - airflow
    restart: 'no'
